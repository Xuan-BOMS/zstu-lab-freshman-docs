<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STM32 基础与控制基础</title>
  <style>
    :root {
      --bg: #f6f2e9;
      --panel: rgba(255, 252, 246, 0.94);
      --text: #1d1d1b;
      --muted: #5f584f;
      --line: rgba(32, 30, 26, 0.12);
      --green: #0b6e4f;
      --green-soft: rgba(11, 110, 79, 0.1);
      --orange: #c45508;
      --blue: #235789;
      --code-bg: #efe6d8;
      --shadow: 0 22px 60px rgba(50, 41, 22, 0.12);
      --radius: 24px;
      --font-sans: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-mono: "Cascadia Code", Consolas, monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.8;
      background:
        radial-gradient(circle at 12% 0%, rgba(11,110,79,0.12), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(196,85,8,0.09), transparent 26%),
        linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
    }

    .page {
      width: min(1040px, calc(100vw - 28px));
      margin: 20px auto 36px;
      background: var(--panel);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.85);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 34px 42px 24px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(11,110,79,0.14), rgba(196,85,8,0.08)),
        linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.58));
    }

    .hero-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(11,110,79,0.16);
      background: rgba(255,255,255,0.74);
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .hero h1 { margin: 14px 0 8px; font-size: clamp(30px, 4vw, 44px); line-height: 1.16; }
    .hero p { margin: 0; color: var(--muted); max-width: 780px; font-size: 15px; }
    .body { padding: 34px 42px 50px; }

    .note {
      margin-bottom: 24px;
      padding: 16px 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(11,110,79,0.1), rgba(255,255,255,0.82));
      border: 1px solid rgba(11,110,79,0.14);
      color: #173f34;
    }

    .markdown-body > *:first-child { margin-top: 0; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { line-height: 1.3; margin: 1.55em 0 0.7em; }
    .markdown-body h1 { font-size: 2.05rem; padding-bottom: 0.3em; border-bottom: 2px solid var(--line); }
    .markdown-body h2 { font-size: 1.55rem; padding: 0.28em 0.72em; border-left: 6px solid var(--green); border-radius: 12px; background: linear-gradient(90deg, var(--green-soft), transparent 74%); }
    .markdown-body h3 { font-size: 1.16rem; color: #113b30; }
    .markdown-body p, .markdown-body ul, .markdown-body ol, .markdown-body blockquote, .markdown-body table, .markdown-body pre { margin: 0 0 1.05em; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.5em; }
    .markdown-body li + li { margin-top: 0.22em; }
    .markdown-body hr { border: 0; height: 1px; margin: 2.1em 0; background: linear-gradient(90deg, transparent, var(--line), transparent); }
    .markdown-body code { padding: 0.12em 0.42em; border-radius: 8px; background: var(--code-bg); font-family: var(--font-mono); font-size: 0.92em; }
    .markdown-body pre { padding: 16px; border-radius: 16px; background: #1f252b; color: #f1f5f7; overflow: auto; }
    .markdown-body pre code { padding: 0; background: transparent; color: inherit; }
    .markdown-body blockquote { padding: 0.8em 1em; border-left: 4px solid var(--orange); border-radius: 0 14px 14px 0; background: rgba(196,85,8,0.08); color: #5a3513; }
    .markdown-body table { width: 100%; border-collapse: collapse; border-radius: 14px; overflow: hidden; border: 1px solid var(--line); }
    .markdown-body th, .markdown-body td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    .markdown-body th { background: rgba(11,110,79,0.08); font-weight: 700; }

    .motion-card {
      margin: 18px 0 24px;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(17,58,47,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(245,240,231,0.94));
      box-shadow: 0 14px 34px rgba(39, 30, 15, 0.08);
    }

    .lab-head { display: flex; gap: 18px; justify-content: space-between; align-items: start; margin-bottom: 18px; }
    .lab-head h4 { margin: 0 0 6px; font-size: 18px; color: #163d32; }
    .lab-head p { margin: 0; color: var(--muted); font-size: 14px; max-width: 620px; }
    .lab-metrics { display: grid; grid-template-columns: repeat(3, minmax(88px, 1fr)); gap: 10px; min-width: 300px; }
    .lab-metrics div { padding: 10px 12px; border-radius: 16px; background: rgba(255,255,255,0.82); border: 1px solid rgba(17,58,47,0.08); text-align: center; }
    .lab-metrics span { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }
    .lab-metrics strong { font-size: 20px; color: #163d32; }

    .pid-grid { display: grid; grid-template-columns: 330px minmax(0, 1fr); gap: 18px; align-items: start; }
    .pid-controls { display: grid; gap: 12px; }
    .control-card { padding: 14px; border-radius: 18px; background: rgba(255,255,255,0.82); border: 1px solid rgba(17,58,47,0.08); }
    .control-card label { display: block; margin-bottom: 8px; font-weight: 700; color: #163d32; }
    .control-row { display: grid; grid-template-columns: minmax(0, 1fr) 88px; gap: 10px; align-items: center; }
    input[type="range"] { width: 100%; accent-color: var(--green); }
    input[type="number"] { width: 100%; padding: 8px 10px; border-radius: 12px; border: 1px solid rgba(17,58,47,0.12); background: #fffdf9; font: inherit; }
    .button-row { display: flex; gap: 10px; margin-top: 4px; }
    .button-row button { flex: 1; padding: 10px 14px; border: 0; border-radius: 14px; font: inherit; font-weight: 700; cursor: pointer; color: white; background: linear-gradient(135deg, var(--green), #148a64); box-shadow: 0 10px 24px rgba(11,110,79,0.22); }
    .button-row button:last-child { background: linear-gradient(135deg, var(--blue), #2b6ca3); box-shadow: 0 10px 24px rgba(35,87,137,0.22); }
    .lab-tip { margin: 0; font-size: 13px; color: var(--muted); }
    .pid-plot-wrap { padding: 14px; border-radius: 22px; background: rgba(255,255,255,0.82); border: 1px solid rgba(17,58,47,0.08); }
    #pid-canvas { width: 100%; height: auto; display: block; border-radius: 16px; background: linear-gradient(180deg, #fffefb 0%, #faf6ef 100%); border: 1px solid rgba(17,58,47,0.08); }
    .plot-caption { display: flex; gap: 18px; margin-top: 10px; font-size: 13px; color: var(--muted); }
    .legend { display: inline-flex; align-items: center; gap: 8px; }
    .legend::before { content: ""; width: 16px; height: 4px; border-radius: 999px; background: currentColor; }
    .legend.response { color: var(--green); }
    .legend.target { color: var(--orange); }

    @media (max-width: 880px) {
      .lab-head, .pid-grid { grid-template-columns: 1fr; display: grid; }
      .lab-metrics { min-width: 0; }
    }

    @media (max-width: 720px) {
      .page { width: min(calc(100vw - 12px), 100%); margin: 6px auto 18px; border-radius: 20px; }
      .hero, .body { padding-left: 16px; padding-right: 16px; }
      .control-row { grid-template-columns: 1fr; }
      .button-row { flex-direction: column; }
      .lab-metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="hero-badge">Single-file HTML</span>
      <h1>STM32 基础与控制基础</h1>
      <p>这是单文件版本：正文、样式、脚本都打包在这一个 HTML 中，直接转发即可。PID 一节已内置一个可运行的交互示例，后面你可以继续在这个文件里扩展动画。</p>
    </section>
    <section class="body markdown-body">
      <div class="note"><strong>说明：</strong>本页由当前 Markdown 内容生成，尽量保持原有阅读结构；交互示例只加在 PID 一节，不影响其他正文排版。</div>
      <div id="app"></div>
    </section>
  </main>

  <script>
    const markdown = "# STM32 基础与控制基础\n\n这份文档写给刚进实验室的新生。以任务导向完成一条32与控制学习的基础路线。\n\n学习方式：\n\n- 可按顺序做，也可根据个人学习逻辑与资料安排，完成任务即可。\n- 每做完一个任务，至少理解工程、接线明确、现象清晰。\n- 鼓励使用ai工具，但任务是布置给人的。\n- ~~直接报个比赛校赛打完就会了~~\n\n---\n\n## 0. 前置工具\n\n这一部分只要求先配齐常用环境，不要求一开始把所有软件都摸透。\n\n### 0.1 软件部分\n\n先把下面几类工具准备好：\n\n- 基础电脑工具包\n  包括文件查看、文本编辑、压缩解压，信息传递、ai等，确保你能顺利使用电脑，并获取实验室其他成员的资料。\n- `Git`（重要）\n  用来管理代码版本。了解 `clone`、`add`、`commit`、`pull`、`push`。\n  ~~或者大概知道原理后你和ide和ai三个有一个会用~~\n- 串口调试工具等调试辅助\n  用来看串口输出、发命令、做最基础联调。\n- 顺手的代码编辑器\n  例如 `VS Code`，没有选择可以问问学长在用什么。\n- MCU 开发工具链\n  会接触到 `Keil`、`eide`、`CubeMX`等等，具体按照学习路线与习惯，成功\"点灯\"视为配置完成。\n\n需要注意的是，具体工具链本身不是学习目标，真正要掌握的是一整套开发链路，这里不在赘述，要求如下\n\n- 如果实验室已经有常用工具链，和与实验室统一。\n- 如果你想自己换工具链，也可以，但前提是你理解这一套链路在做什么，方便迁移。\n- 你至少要知道怎么创建工程、生成代码、编译、烧录、调试、看报错、修改设置。\n\n这里不再赘述\n\n### 0.2 硬件部分\n\n常用硬件主要有这些：\n\n- 烧录器 / 调试器\n   `ST-Link`、`J-Link`、`DAPLink`等（实验室有但容易丢失，可自行购买）。\n- 开发板 / 核心板\n  实验室有大量 `F1`、`F4` 开发板可直接使用，也可自行选择，51、audio、esp32等开发板不纳入学习计划。\n- 杜邦线、面包板、电源线\n  用来接 LED、按键、继电器、传感器模块，实验室有，后续学习电路板绘制会替代。\n- 串口调试工具\n  例如 `CH340`、`CP2102`等。\n- 基础外设模块（实验室有）\n  例如 LED、按键、继电器、小电机、OLED、各类传感器模块。\n\n这里也有一个结论要先说清楚：\n\n- 实验室一般已经有基础器材，不需要一开始自己买很多。\n- 开发板用实验室现成的 `F1`、`F4` 就足够入门。\n- 你自己选板子也可，入门学习阶段差别并不大。\n\n### 0.3 学习所需知识要求\n\n开始学习前，需要有以下知识：\n\n- 会写基本 C 语言，直到函数、数组、结构体、指针。\n- 知道什么是高低电平、上拉下拉、输入输出。\n- 能看懂最简单的原理图连线。\n\n---\n\n## 1. STM32 基础开发\n\n这一部分目的是完成基础任务。部分内容可先完成“实现”而不是“全部理解”。\n\n建议顺序：\n\n`GPIO -> 定时器 -> 中断 -> PWM`\n\n### 1.1 任务一：GPIO 控制 LED、继电器，读取开关\n\n这是 STM32 入门第一关。你要先理解最基本的GPIO输入和输出。\n\n你需要完成：\n\n- 操控GPIO电平，例如点亮一个 LED，并实现闪烁，或控制一个继电器吸合和断开。\n- 读取一个开关或按键状态。\n\n你需要理解的内容：\n\n- 推挽输出、输入模式、上拉下拉分别是什么。\n- 为什么有的按键按下是低电平，有的是高电平。\n\n完成标准：\n\n- 能重新配置一个 GPIO 输出口。\n- 自己能解释电路是高电平有效还是低电平有效。\n\n小问题：\n- 什么是按键抖动，为什么要消抖。\n\n### 1.2 任务二：认识定时器，用定时器改变 GPIO 状态\n\n学完 GPIO 后，不要只会用 `HAL_Delay`。下一步要认识定时器。\n\n你需要完成：\n\n- 配一个基础定时器。\n- 让它每隔固定时间翻转一次 GPIO。\n- 了解 `软件延时` 和 `定时器定时` 两种方式。\n\n你需要理解的内容：\n\n- 定时器不是只用来“延时”，它本质上是一个计数器。\n- 预分频、自动重装值决定了定时时间。\n- 用定时器做周期任务，比在主循环里等更接近真实项目写法。\n\n完成标准：\n\n- 自己能根据时钟算出定时周期。\n- 能修正 LED 闪烁周期。\n- 能说清楚为什么阻塞式延时会影响程序同时做别的事。\n\n小问题：\n- 不同的定时器之间有什么区别，为什么相同配置下时间不同。\n  \n### 1.3 任务三：进一步认识定时器和中断，实现中断控制\n\n中断是 STM32 开发中的核心概念。学到这里，你开始从“轮询思维”进入“事件思维”。\n\n你需要完成：\n\n- 配置一个定时器更新中断。\n- 在中断回调里修改 GPIO 状态。\n- 额外尝试一个外部中断按键，用按键触发 LED 状态切换。\n\n你需要理解的内容：\n\n- 什么叫中断触发，什么叫中断服务函数。\n- 为什么中断里不要写太重的逻辑。\n- 主循环和中断分别适合做什么事。\n\n完成标准：\n\n- 能解释“轮询”和“中断”的区别。\n- 能定位“中断没进来”常见原因，例如没开 NVIC、回调写错、标志位没处理。\n\n小问题：\n- 中断优先级是什么，为什么有时候需要调整。\n\n### 1.4 任务四：认识 PWM，实现波形控制\n\nPWM 是后面控制电机、舵机、调光、驱动功率器件的基础。\n\n你需要完成：\n\n- 输出一路 PWM。\n- 用 PWM 控制 LED 明暗变化，或者控制蜂鸣器、小电机转速。\n- 修改频率和占空比，观察现象变化。\n\n你需要理解的内容：\n\n- PWM 本质上是定时器的一种输出方式。\n- 频率和占空比分别影响什么。\n\n完成标准：\n\n- 能修改占空比从 10% 改到 90%，并看懂现象。\n- 知道为什么电机控制和 LED 呼吸灯的 PWM 参数不会完全一样。\n- 知道后面做控制时，PWM 往往就是“执行器输出”。\n\n小问题：\n- PWM 输出引脚和普通 GPIO 有什么区别，为什么有些引脚不能做 PWM 输出\n\n---\n\n## 2. 通讯相关\n\n这一部分的目标是：学会一类总线，就能学会一类外设。\n\n建议顺序：\n\n`串口 -> I2C -> SPI -> CAN、USB 等其他总线`\n\n### 2.1 任务五：串口\n\n串口是最先要掌握的通信方式，也是最常用的调试方式，往往也是你和你的队友板子交流的方式。\n\n你需要完成：\n\n- 使用 `CH340` 或其他 USB 转串口模块连接开发板。\n- 实现串口打印。\n- 实现串口接收一个字符或一行命令，再控制 LED 或继电器动作。\n\n推荐小任务：\n\n- 上位机发送 `on`、`off`，控制 LED。\n- 定时打印计数值或按键状态。\n\n完成标准：\n\n- 能独立配置串口波特率、收发引脚。\n- 能排查串口乱码、收不到数据、收发反接等基础问题。\n- 知道串口除了调试，还可以接很多简单模块。\n\n小问题：\n- 为什么串口通信有波特率，波特率不匹配会有什么现象。\n\n### 2.2 任务六：I2C\n\nI2C 常用于传感器、EEPROM、OLED 这类低速外设。\n\n你需要完成：\n\n- 接一个 `I2C` 外设。\n- 能读出至少一个寄存器。\n- 能把读取结果通过串口打印出来。\n\n推荐外设：\n\n- `OLED`\n- `MPU6050` 这类惯性传感器\n\n完成标准：\n\n- 知道主机、从机、地址、读写寄存器在说什么。\n- 遇到 I2C 无响应时，知道先查地址、上拉、电平、时序。\n- 能理解模块的i2c例程，知道每个函数在干什么（虽然例程写的不一定好）。\n\n小问题：\n- I2C 的时序和电平要求为什么比较严格，为什么有时候需要加上拉电阻。\n\n### 2.3 任务七：SPI\n\nSPI 常用于速度更高的显示、存储、传感器等器件。\n\n你需要完成：\n\n- 接一个 `SPI` 外设。\n- 完成至少一次读写。\n- 用串口或显示器确认数据正确。\n\n推荐外设：\n\n- `TFT` 屏幕\n- 高速 ADC 或部分陀螺仪模块\n\n完成标准：\n\n- 知道 `SCK`、`MOSI`、`MISO`、`CS` 分别干什么。\n- 知道 SPI 有主从关系，也知道模式配置会影响通信是否成功。\n- 知道为什么同样是“读寄存器”，SPI 和 I2C 的使用感受不一样。\n\n小问题：\n- SPI与I2C相比，为什么速度更快，但距离短。\n\n---\n\n## 3. 附加内容\n\n### 3.1 RTOS\n\n`RTOS` 不是新生必学内容，但可了解。\n\n建议先完成前面的 GPIO、定时器、中断、PWM、串口、I2C、SPI，再开始看 `FreeRTOS`等操作系统。\n\n完成标准：\n\n- 能解释任务、调度、延时、队列这些最基本概念。\n- 不会把 RTOS 当成“高级版 while(1)”。\n- 知道用rtos会让代码更清晰，但也会增加复杂度。\n\n小问题：\n- 为什么有时候 RTOS 反而不适合做简单的控制任务，或者资源受限的项目。\n\n---\n\n## 4. 控制相关学习\n\n我们做的控制大多较为简单，这部分学习也不难。\n目标不是培养你去做复杂控制理论推导，而是让你具备做简单嵌入式任务的能力。\n如果你在浙江的高中学过“通用技术”这门学科且还记得，那你会很快入手。（或者你在大学是控制类的？那你肯定比我了解的多）\n\n你要先建立一个总认识：\n\n- 控制系统通常有输入、测量、计算、输出四个环节。\n- 嵌入式程序通常要把单纯的控制代码与具体实现分开写。\n- 控制的具体结果会受很多因素影响，需要通过软件硬件等多方面去调试配合。\n\n### 4.1 任务八：理解开环、闭环与采样周期\n\n\n你需要知道：\n\n- 开环：给多少输出，不看结果。\n- 闭环：测结果，再根据误差继续调。\n- 采样周期：控制程序不是连续运行的，而是按固定周期更新。\n\n推荐小任务：\n\n- 用按键切换 PWM 占空比，观察电机或风扇变化，这就是最简单的开环。\n- 再引入一个测量量，例如编码器速度或传感器反馈，尝试按误差调节输出，这是闭环的起点。\n\n完成标准：\n\n- 能分清“命令值”“反馈值”“误差”。\n- 知道控制程序为什么要固定周期执行。\n\n小问题：\n- 采样周期太长或太短会有什么问题，为什么有时候需要调整\n\n### 4.2 任务九：状态机\n\n状态机是嵌入式程序组织的基础，也是控制程序避免混乱的关键工具。\n\n你需要知道：\n\n- 系统不是只有“运行”一种状态，通常还有待机、启动、运行、异常、停止。\n- 程序行为不只取决于输入，还取决于当前状态。\n- 一旦项目开始变复杂，不用状态机，代码很容易乱。\n\n推荐小任务：\n\n- 写一个四状态系统：`idle -> ready -> run -> error`。\n- 条件来自按键、定时器、传感器阈值。\n- 错误状态下禁止电机输出，只允许复位后恢复。\n\n完成标准：\n\n- 能把“什么时候切状态”写清楚。\n- 状态切换条件不靠一堆零散 `if` 硬拼。\n- 出现异常时，程序行为是可预期的。\n\n小问题：\n- 为什么状态机更适合复杂系统。\n\n### 4.3 任务十：PID\n\n`PID` 是最常见的入门控制。先学会它，再去看别的控制方法会发现他真的很“入门”。\n\n你至少要知道：\n\n- `P`：误差大，输出就加大，作用直接。\n- `I`：消除长期偏差，但太大容易积累过头。\n- `D`：看变化趋势，帮助抑制震荡，但对噪声敏感。\n\n入门时不要一上来就死记公式，更重要的是理解这三个量分别在“帮系统做什么”。\n\n推荐小任务：\n\n- 用一个带反馈的对象做速度控制或位置控制。\n- 最推荐的是：`PWM 驱动电机 + 编码器测速 + PID 调速`。\n- 如果暂时没有编码器，也可以先做一个简单模拟任务，例如让输出跟随目标值变化，先练程序框架和调参流程。\n\n最基本的调试顺序：\n\n- 先只用 `P`\n- 再加 `I`\n- 最后再决定要不要加 `D`\n\n完成标准：\n\n- 能解释超调、振荡、稳态误差这些现象。\n- 能看串口打印的误差和输出变化。\n- 能做最基本的参数调整，而不是只会抄一组参数。\n\n### 4.4 任务十一：认识电机\n\n做嵌入式控制，通常绕不开电机。\n\n入门阶段至少要认识这些：\n\n- 直流电机：最容易上手，适合学 PWM、方向控制、测速。\n- 舵机：适合学固定周期 PWM 和角度控制。\n- 步进电机：适合理解脉冲控制和位置控制。\n- 无刷电机：后续很常见，但入门门槛更高。\n\n你需要知道的不是电机分类背诵，而是下面这些问题：\n\n- 这个电机怎么驱动。\n- 需不需要驱动板。\n- 能不能直接用单片机 IO 口带。\n- 怎么测它的速度、位置、电流。\n\n推荐小任务：\n\n- 直流电机正反转控制。\n- PWM 调速。\n- 如果有编码器，再做一个闭环调速。\n\n完成标准：\n\n- 知道“单片机控制电机”和“单片机直接带电机”不是一回事。\n- 知道驱动、电源、续流、保护这些词为什么重要。\n\n### 4.5 任务十二：认识基础传感器\n\n控制离不开传感器。入门阶段建议按“最常见、最能直接用于闭环”的顺序去认识。\n\n先认识这几类：\n\n- 按键、限位开关\n- 编码器\n- 电位器\n- 电流传感器\n- 距离传感器\n- 惯性传感器：加速度计、陀螺仪、IMU\n\n这里尤其要先分清：\n\n- 加速度计主要测线加速度，也常用于静态姿态估计。\n- 陀螺仪主要测角速度，动态响应快，但会漂移。\n- IMU 往往是多种惯性传感器的组合。\n\n推荐小任务：\n\n- 读取一个 `IMU` 模块的原始数据。\n- 通过串口输出角速度或加速度。\n- 做一次静止零偏校准。\n- 用最简单的低通滤波或互补滤波改善数据表现。\n\n完成标准：\n\n- 知道传感器原始值不是“拿来就能直接用”的。\n- 知道为什么控制前常常要先做校准、滤波、限幅。\n\n### 4.6 任务十三：把控制程序写得像一个系统\n\n控制项目真正难的地方，经常不是公式，而是程序组织。\n\n建议你尽早形成下面这个结构意识：\n\n- 采集层：读传感器\n- 估计层：滤波、换算、校准\n- 控制层：状态机、PID、保护逻辑\n- 执行层：PWM、方向、继电器\n- 通信层：串口打印、上位机调参\n\n推荐综合任务：\n\n- 做一个“目标速度可调”的电机控制小系统。\n- 按键或串口输入目标值。\n- 编码器提供反馈。\n- PID 负责调速。\n- 状态机负责启动、停止、故障保护。\n- 串口负责打印关键变量。\n\n完成标准：\n\n- 你的工程不是所有逻辑都塞在 `main.c` 里。\n- 出现问题时，你知道是采集问题、控制问题还是执行问题。\n\n---\n\n## 5. 建议学习节奏\n\n如果你是刚进实验室的新生，比较稳妥的顺序是：\n\n### 第 1 阶段\n\n- 跑通工具链\n- 点灯\n- 按键输入\n- 串口打印\n\n### 第 2 阶段\n\n- 定时器\n- 中断\n- PWM\n- I2C 或 SPI 接一个外设\n\n### 第 3 阶段\n\n- 读一个传感器\n- 控一个执行器\n- 写一个状态机\n\n### 第 4 阶段\n\n- 做一个最小闭环\n- 再看 `FreeRTOS`\n\n---\n\n## 6. 最后建议\n\n- 新人最怕的不是不会，而是总想一步到位。\n- 嵌入式学习最有效的方法不是看很多，而是一个任务一个任务做完。\n- 每学一个外设，都问自己三个问题：它是干什么的、它怎么调、它坏了怎么查。\n- 真正拉开差距的，往往不是谁会背更多接口，而是谁更会定位问题、组织代码、把系统做完整。\n\n如果你按这条路线走完，后面再去做比赛、小项目、传感器节点、电机控制、RTOS，都会顺很多。\n\n---\n\n## 7. 可继续看的资料\n\n如果你准备继续往下学，优先看这些方向的公开资料：\n\n- ST 官方 `Reference Manual`、`Datasheet`、`Application Note`\n- TI 或 Control Engineering 的 `PI / PID` 入门资料\n- Barr Group 关于嵌入式 `state machine` 的文章\n- ST 或 Analog Devices 关于加速度计、陀螺仪、IMU 的基础资料\n\n先做任务，再带着问题去查资料，效率最高。\n";
    const pidDemoHtml = "\n<section class=\"motion-card pid-lab\" id=\"pid-lab\">\n  <div class=\"lab-head\">\n    <div>\n      <h4>PID 可视化实验</h4>\n      <p>修改 <code>P</code>、<code>I</code>、<code>D</code> 与预设值，观察系统如何靠近目标值，以及是否出现超调、振荡与稳定误差。</p>\n    </div>\n    <div class=\"lab-metrics\">\n      <div><span>当前值</span><strong id=\"pid-current\">0.00</strong></div>\n      <div><span>预设值</span><strong id=\"pid-target-value\">60.00</strong></div>\n      <div><span>误差</span><strong id=\"pid-error\">60.00</strong></div>\n    </div>\n  </div>\n\n  <div class=\"pid-grid\">\n    <div class=\"pid-controls\">\n      <div class=\"control-card\">\n        <label for=\"kp-range\">P 参数</label>\n        <div class=\"control-row\">\n          <input id=\"kp-range\" type=\"range\" min=\"0\" max=\"12\" step=\"0.1\" value=\"4.8\" />\n          <input id=\"kp-number\" type=\"number\" min=\"0\" max=\"12\" step=\"0.1\" value=\"4.8\" />\n        </div>\n      </div>\n\n      <div class=\"control-card\">\n        <label for=\"ki-range\">I 参数</label>\n        <div class=\"control-row\">\n          <input id=\"ki-range\" type=\"range\" min=\"0\" max=\"3\" step=\"0.01\" value=\"0.55\" />\n          <input id=\"ki-number\" type=\"number\" min=\"0\" max=\"3\" step=\"0.01\" value=\"0.55\" />\n        </div>\n      </div>\n\n      <div class=\"control-card\">\n        <label for=\"kd-range\">D 参数</label>\n        <div class=\"control-row\">\n          <input id=\"kd-range\" type=\"range\" min=\"0\" max=\"4\" step=\"0.01\" value=\"1.2\" />\n          <input id=\"kd-number\" type=\"number\" min=\"0\" max=\"4\" step=\"0.01\" value=\"1.2\" />\n        </div>\n      </div>\n\n      <div class=\"control-card\">\n        <label for=\"sp-range\">预设值</label>\n        <div class=\"control-row\">\n          <input id=\"sp-range\" type=\"range\" min=\"-20\" max=\"100\" step=\"1\" value=\"60\" />\n          <input id=\"sp-number\" type=\"number\" min=\"-20\" max=\"100\" step=\"1\" value=\"60\" />\n        </div>\n      </div>\n\n      <div class=\"button-row\">\n        <button id=\"pid-reset\" type=\"button\">重置实验</button>\n        <button id=\"pid-toggle\" type=\"button\">暂停</button>\n      </div>\n      <p class=\"lab-tip\">建议先只调 <code>P</code>，再逐步增加 <code>I</code>，最后再观察 <code>D</code> 对波动和响应速度的影响。</p>\n    </div>\n\n    <div class=\"pid-plot-wrap\">\n      <canvas id=\"pid-canvas\" width=\"900\" height=\"320\"></canvas>\n      <div class=\"plot-caption\">\n        <span class=\"legend response\">系统响应</span>\n        <span class=\"legend target\">目标值</span>\n      </div>\n    </div>\n  </div>\n</section>";

    marked.setOptions({ gfm: true, breaks: false, headerIds: false, mangle: false });
    document.getElementById('app').innerHTML = marked.parse(markdown);

    function insertAfterHeading(matchFn, html) {
      const headings = Array.from(document.querySelectorAll('#app h1, #app h2, #app h3'));
      const target = headings.find(h => matchFn(h.textContent.trim()));
      if (!target) return null;
      const host = document.createElement('div');
      host.innerHTML = html;
      const node = host.firstElementChild;
      target.insertAdjacentElement('afterend', node);
      return node;
    }

    insertAfterHeading(text => text.includes('PID'), pidDemoHtml);

    const kpRange = document.getElementById('kp-range');
    const kpNumber = document.getElementById('kp-number');
    const kiRange = document.getElementById('ki-range');
    const kiNumber = document.getElementById('ki-number');
    const kdRange = document.getElementById('kd-range');
    const kdNumber = document.getElementById('kd-number');
    const spRange = document.getElementById('sp-range');
    const spNumber = document.getElementById('sp-number');
    const resetBtn = document.getElementById('pid-reset');
    const toggleBtn = document.getElementById('pid-toggle');
    const currentEl = document.getElementById('pid-current');
    const targetEl = document.getElementById('pid-target-value');
    const errorEl = document.getElementById('pid-error');
    const canvas = document.getElementById('pid-canvas');
    const ctx = canvas.getContext('2d');

    const state = { running: true, time: 0, integral: 0, lastError: 0, x: 0, v: 0, history: [] };

    function bindPair(rangeEl, numberEl) {
      const sync = value => {
        rangeEl.value = value;
        numberEl.value = value;
      };
      rangeEl.addEventListener('input', () => sync(rangeEl.value));
      numberEl.addEventListener('input', () => sync(numberEl.value));
    }

    bindPair(kpRange, kpNumber);
    bindPair(kiRange, kiNumber);
    bindPair(kdRange, kdNumber);
    bindPair(spRange, spNumber);

    function params() {
      return {
        kp: parseFloat(kpNumber.value),
        ki: parseFloat(kiNumber.value),
        kd: parseFloat(kdNumber.value),
        setpoint: parseFloat(spNumber.value)
      };
    }

    function resetSimulation() {
      state.time = 0;
      state.integral = 0;
      state.lastError = 0;
      state.x = 0;
      state.v = 0;
      state.history = [];
    }

    function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }

    function step(dt) {
      const { kp, ki, kd, setpoint } = params();
      const error = setpoint - state.x;
      state.integral = clamp(state.integral + error * dt, -120, 120);
      const derivative = (error - state.lastError) / dt;
      const u = clamp(kp * error + ki * state.integral + kd * derivative, -120, 120);
      const accel = (u - 1.4 * state.v - 0.45 * state.x);

      state.v += accel * dt;
      state.x += state.v * dt;
      state.lastError = error;
      state.time += dt;
      state.history.push({ t: state.time, y: state.x, setpoint });
      while (state.history.length > 900) state.history.shift();

      currentEl.textContent = state.x.toFixed(2);
      targetEl.textContent = setpoint.toFixed(2);
      errorEl.textContent = (setpoint - state.x).toFixed(2);
    }

    function draw() {
      const dpr = Math.max(window.devicePixelRatio || 1, 1);
      const cssWidth = canvas.clientWidth || 900;
      const cssHeight = 320;
      if (canvas.width !== Math.round(cssWidth * dpr) || canvas.height !== Math.round(cssHeight * dpr)) {
        canvas.width = Math.round(cssWidth * dpr);
        canvas.height = Math.round(cssHeight * dpr);
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const w = cssWidth;
      const h = cssHeight;
      const pad = { left: 52, right: 16, top: 18, bottom: 34 };
      const plotW = w - pad.left - pad.right;
      const plotH = h - pad.top - pad.bottom;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#fffefb';
      ctx.fillRect(0, 0, w, h);

      const { setpoint } = params();
      const values = state.history.flatMap(p => [p.y, p.setpoint]);
      const maxValue = Math.max(setpoint + 15, ...values, 20);
      const minValue = Math.min(setpoint - 15, ...values, -20);
      const range = Math.max(maxValue - minValue, 20);
      const xOf = index => pad.left + (index / Math.max(state.history.length - 1, 1)) * plotW;
      const yOf = value => pad.top + (1 - (value - minValue) / range) * plotH;

      ctx.strokeStyle = 'rgba(17,58,47,0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 5; i++) {
        const y = pad.top + (i / 5) * plotH;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(w - pad.right, y);
        ctx.stroke();
        const tickValue = (maxValue - (range * i / 5)).toFixed(0);
        ctx.fillStyle = '#746d64';
        ctx.font = '12px Segoe UI';
        ctx.fillText(tickValue, 10, y + 4);
      }

      ctx.strokeStyle = 'rgba(17,58,47,0.12)';
      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top);
      ctx.lineTo(pad.left, h - pad.bottom);
      ctx.lineTo(w - pad.right, h - pad.bottom);
      ctx.stroke();

      if (state.history.length > 1) {
        ctx.save();
        ctx.setLineDash([8, 6]);
        ctx.strokeStyle = '#c45508';
        ctx.lineWidth = 2;
        ctx.beginPath();
        state.history.forEach((point, index) => {
          const x = xOf(index);
          const y = yOf(point.setpoint);
          if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.restore();

        ctx.strokeStyle = '#0b6e4f';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        state.history.forEach((point, index) => {
          const x = xOf(index);
          const y = yOf(point.y);
          if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
      }

      ctx.fillStyle = '#746d64';
      ctx.font = '12px Segoe UI';
      ctx.fillText('??', w - 42, h - 10);
      ctx.save();
      ctx.translate(14, 24);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('??', 0, 0);
      ctx.restore();
    }

    let lastTs = performance.now();
    function frame(ts) {
      const elapsed = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      if (state.running) {
        const stepDt = 1 / 120;
        let remaining = elapsed;
        while (remaining > 0) {
          const dt = Math.min(stepDt, remaining);
          step(dt);
          remaining -= dt;
        }
      }
      draw();
      requestAnimationFrame(frame);
    }

    resetBtn.addEventListener('click', () => resetSimulation());
    toggleBtn.addEventListener('click', () => {
      state.running = !state.running;
      toggleBtn.textContent = state.running ? '??' : '??';
    });

    [kpRange, kpNumber, kiRange, kiNumber, kdRange, kdNumber, spRange, spNumber].forEach(el => {
      el.addEventListener('input', draw);
      el.addEventListener('change', draw);
    });

    window.addEventListener('resize', draw);
    resetSimulation();
    draw();
    requestAnimationFrame(frame);
  </script>
</body>
